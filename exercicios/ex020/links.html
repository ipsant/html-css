<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /* SELETORES PERSONALIZADOS
        #  = id
        .  = class
        :  = pseudo-class
        :: = pseudo-element
        >  = children "filho"
        */

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            text-decoration: none;
            font-weight: bold;
        }
/* hover = função para quando passar o mouse em cima */

        a:visited {
            color: green;
        }
        a:hover { 
            text-decoration: underline;
        }
/* active = quando clicado ativa função */
        a:active {
            color: aqua;
        }

        .important::after {
            content: ' ⚠︎';
        }

    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://github.com/ipsant?tab=repositories" target="_blank" class="important">Repositório GitHub</a></li>
        <li><a href="https://www.youtube.com/@italoprado7769" target="_blank">Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com/" target="_blank">Site do CursoemVídeo</a></li>
    </ul>
    
</body>
</html>
