<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu proprio servidor</p>
<!-- O ideal é adicionar mais formatos de vídeos para mais compatibilidade com todos os navegadores -->
 <video controls width="560" poster="imagens/capa-video.jpg">
    <source src="midia/meu-video.mp4" type="video/mp4">
    <source src="midia/meu-video-webm.webm" type="video/webm">
    <p>Seu navegador não possui compatibilidade com este formato de vídeo. <a href="midia/meu-video.mp4">Clique aqui</a> para baixar.</p>
 </video>
 <h1>Inserindo vídeos do YouTube</h1>
 <iframe width="560" height="315" src="https://www.youtube.com/embed/OzUnqQk4eOg?si=DOXXK0eLxvUaFwJU" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    
</body>
</html>
