<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>
    <style>
        iframe {
            height: 800px;
            width: 600px;
        }
        /*A CONFIGURAÇÃO ESTABELECIDA NO CSS PREVALECE A DE DENTRO DO HTML*/
    </style>
</head>
<body>
    <h1>Testando o uso de um iframe</h1>
    <p>
        Acessando o site do 
        <!--TAMANHO PADRÃO DE IFRAME É 300X150-->
        <iframe src="https://cursoemvideo.com" frameborder="0" height="400" width="600">
            <a href="https://cursoemvideo.com" target="_blank">Curso em Vídeo</a>
        </iframe>
        para aprender a programar.
    </p>

    <p>
        Esse é o meu repositório 
        <iframe src="https://github.com/ipsant" frameborder="0" height="250" width="500">
            <a href="https://github.com/ipsant" target="_blank">GitHub</a>
        </iframe>

    </p>
    
</body>
</html>
