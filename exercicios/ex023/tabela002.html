<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<style>
    body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        padding-left: 15px;
        font-family: Arial, Helvetica, sans-serif;
    }

    table {
        margin: auto;
        border-collapse: collapse;
        width: 600px;
        height: 20px;
    }

    tbody tr:nth-child(2n) {
        background-color: lightgray;
    }

    th {
        background-color: gray;
        color: white;
    }

    tr, th, td {
        border: 1px solid black;
        text-align: center;
        padding: 5px;
    }

    .num {
        text-align: right;
    }

    tfoot {
        background-color: gray;
        color: white;
    }
</style>
<body>
    <h1>Uso de tabelas grandes</h1>
    <!--
    ANATOMIA PARA TABELAS GRANDES
    TABLE   
        THEAD
            TR, TD, TH
        TBODY
            TR, TD, TH
        TFOOT
            TR, TD, TH
    -->
    <hr>

    <table>
        <caption>Unidades federativas do Brasil por população</caption>

        <thead>
            <tr>
                <th scope="col" style="width: 80px;">Posição</th>
                <th scope="col">Unidade federativa</th>
                <th scope="col" style="width: 140px;">População (2025)</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>São Paulo</td>
                <td class="num">46 081 801</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Minas Gerais</td>
                <td class="num">21 393 441</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Rio de Janeiro</td>
                <td class="num">17 223 547</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Bahia</td>
                <td class="num">14 870 907</td>
            </tr>
            <tr>
                <td>5</td>
                <td>Paraná</td>
                <td class="num">11 890 517</td>
            </tr>
            <tr>
                <td>6</td>
                <td>Rio Grande do Sul</td>
                <td class="num">11 233 263</td>
            </tr>
            <tr>
                <td>7</td>
                <td>Pernambuco</td>
                <td class="num">9 562 007</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <th scope="row">Total</th>
                <td> </td>
                <td class="num"><strong>84 698 789</strong></td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
