<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji</title>
    <link rel="shortcut icon" href="favicon/favicon_io/favicon.ico" type="image/x-icon">
</head>
<body>
    <h1>Desafio dos Emojis</h1>
    <h2>Emojis em listas "desorganizadas"</h2>
    <ul>
        <li>&#x1F600</li>
        <li>&#x1F600</li>
        <li>&#x1F600</li>
    </ul>

    <h2>Emojis em lista organizadas por números usando a tag <code>&lt;ol&gt;</code> com variação de <code>type="1"</code></h2>
    <ol type="1">
        <li>&#x1F600</li>
        <li>&#x1F600</li>
        <li>&#x1F600</li>
    </ol>

    <h2>Emojis em lista organizadas por números usando a tag <code>&lt;ol&gt;</code>com variação de <code>type="a"</code></h2>
    <ol type="a">
        <li>&#x1F600</li>
        <li>&#x1F600</li>
        <li>&#x1F600</li>
    </ol>

    
</body>
</html>
