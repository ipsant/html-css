<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif
        }

        table {
            border:1px solid black;
            border-collapse: collapse;
        }

        td, th {
            border: 1px solid black;
            width: 90px;
            padding: 5px;
            text-align: center;
        }

        th {
            background-color: gray;
            color: white;
        }

    </style>
</head>
<body>  

<table>
    <thead>
        <tr>
            <th rowspan="2" scope="colgroup">Àrea</th>
            <th rowspan="2" scope="colgroup">Disciplinas</th>
            <th colspan="2" scope="rowgroup">Notas</th>
            <th rowspan="2" scope="colgroup">Média</th>
        </tr>
        <tr>
            <th>Nota 1</th>
            <th>Nota 2</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <th rowspan="4" scope="colgroup">Exatas</th>
            <td>Matemática</td>
            <td>8</td>
            <td>8,5</td>
            <td>8,25</td>
        </tr>
        <tr>
            <td>Física</td>
            <td>7</td>
            <td>7,5</td>
            <td>7,25</td>
        </tr>
        <tr>
            <td>Química</td>
            <td>7</td>
            <td>8</td>
            <td>7,5</td>
        </tr>
        <tr>
            <td>Biologia</td>
            <td>6,5</td>
            <td>7,8</td>
            <td>7,15</td>
        </tr>
        <tr>
            <th colspan="4" style="text-align: left;" scope="rowgroup">Média de exatas</th>
            <th>7,53</th>
        </tr>

        <tr>
            <th rowspan="2" scope="colgroup">Humanas</th>
            <td>História</td>
            <td>7,6</td>
            <td>8</td>
            <td>7,8</td>
        </tr>
        <tr>
            <td>Geografia</td>
            <td>8,1</td>
            <td>9</td>
            <td>8,5</td>
        </tr>
        <tr>
            <th colspan="4" style="text-align: left;" scope="rowgroup">Média de humanas</th>
            <th>8,17</th>
        </tr>
    </tbody>
</table>
    
</body>
</html>
